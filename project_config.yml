# Configuração do Projeto Iris MLOps
# Este arquivo pode ser usado para carregar configurações de forma centralizada

# Unity Catalog
catalog:
  name: main
  schema: iris_mlops

# Tabelas
tables:
  raw: iris_raw
  train: iris_train
  test: iris_test
  inference: iris_inference

# MLflow
mlflow:
  experiment_name: /Users/eduardolimaofficial410@gmail.com/iris-classification
  model_name: iris_classifier
  tracking_uri: databricks

# Modelo
model:
  type: random_forest
  hyperparameters:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
  
  # Parâmetros de treinamento
  training:
    test_size: 0.2
    validation_size: 0.2
    stratify: true

# Model Serving
serving:
  endpoint_name: iris-classifier-endpoint
  workload_size: Small
  scale_to_zero: true
  min_provisioned_throughput: 0
  max_provisioned_throughput: 100

# Monitoring
monitoring:
  enabled: true
  granularities:
    - 1 day
  slicing_exprs:
    - target_name
  baseline_table: iris_train
  
  # Thresholds para alertas
  thresholds:
    accuracy_min: 0.90
    drift_pvalue: 0.05

# Ambientes
environments:
  dev:
    catalog: ${workspace.current_user.short_name}_dev
    schedule_pause: true
  
  staging:
    catalog: staging
    schedule_pause: true
  
  prod:
    catalog: prod
    schedule_pause: false

# Features para criar
feature_engineering:
  ratios:
    - sepal_ratio
    - petal_ratio
  areas:
    - sepal_area
    - petal_area
