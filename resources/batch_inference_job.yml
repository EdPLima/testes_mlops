# VERIFIED: Configured for serverless compute
# ==============================================================================
# Job: Batch Inference Pipeline
# ==============================================================================
#
# PROPÓSITO:
#   Executa inferência em lote usando o modelo em produção.
#   Processa novos dados da tabela dataset_drift e salva predições.
#
# QUANDO EXECUTAR:
#   - Diariamente após novos dados chegarem
#   - On-demand quando necessário
#   - Após promover novo modelo para produção
#
# ESTRUTURA DO PIPELINE:
#   1. load_new_data: Carrega dados da tabela dataset_drift
#   2. preprocess: Normaliza features (StandardScaler)
#   3. run_inference: Carrega modelo production e faz predições
#   4. save_predictions: Salva resultados na tabela batch_predictions
#   5. save_metadata: Registra métricas e estatísticas do batch
#
# DEPENDÊNCIAS:
#   - Tabela study.mlops_iris.dataset_drift deve estar populada
#   - Modelo production deve existir no MLflow Registry
#
# COMPUTE:
#   - Este workspace só permite serverless. Não usar job_clusters /
#     existing_cluster_id / new_cluster nas tasks.
#
# ==============================================================================

resources:
  jobs:
    batch_inference_pipeline:
      name: "Batch Inference Pipeline"
      description: |
        Executa inferência em lote usando modelo production.
        Processa dados de dataset_drift e salva predições em batch_predictions.

      # ==========================================================================
      # AGENDAMENTO
      # ==========================================================================
      schedule:
        quartz_cron_expression: "0 30 3 * * ?"  # Diariamente às 3:30 AM
        timezone_id: "America/Sao_Paulo"
        pause_status: "${var.schedule_pause_status}"

      # ==========================================================================
      # CONFIGURAÇÕES GLOBAIS DO JOB
      # ==========================================================================
      max_concurrent_runs: 1  # Apenas 1 execução por vez
      timeout_seconds: 3600   # Timeout de 1 hora

      # ==========================================================================
      # ENVIRONMENTS (Serverless)
      # ==========================================================================
      # Substitui os "libraries:" de cluster clássico.
      # O wheel do bundle (teste_mlops) precisa estar aqui como dependência,
      # senão o python_wheel_task não encontra o pacote.
      #
      environments:
        - environment_key: "default"
<<<<<<< Updated upstream
          python:
            version: "3.10"
          pip:
            requirements:
=======
          spec:
            environment_version: "4"
            dependencies:
>>>>>>> Stashed changes
              - "../dist/*.whl"
              - "pandas>=2.0.0"
              - "scikit-learn>=1.3.0"
              - "mlflow>=2.9.0"

      # ==========================================================================
      # TASKS (ETAPAS DO PIPELINE)
      # ==========================================================================

      tasks:
        # ======================================================================
        # TASK 1: CARREGAR NOVOS DADOS
        # ======================================================================
        - task_key: "load_new_data"
          description: "Carrega e valida dados de dataset_drift"
          environment_key: "default"

          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_load_data"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"

        # ======================================================================
        # TASK 2: PRÉ-PROCESSAR DADOS
        # ======================================================================
        - task_key: "preprocess"
          description: "Normaliza features usando StandardScaler"
          environment_key: "default"

          depends_on:
            - task_key: "load_new_data"

          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_preprocess"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"

        # ======================================================================
        # TASK 3: EXECUTAR INFERÊNCIA
        # ======================================================================
        - task_key: "run_inference"
          description: "Carrega modelo production e executa inferência"
          environment_key: "default"

          depends_on:
            - task_key: "preprocess"

          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_predict"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"

        # ======================================================================
        # TASK 4: SALVAR PREDIÇÕES
        # ======================================================================
        - task_key: "save_predictions"
          description: "Salva predições em batch_predictions"
          environment_key: "default"

          depends_on:
            - task_key: "run_inference"

          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_save"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"

        # ======================================================================
        # TASK 5: SALVAR METADADOS
        # ======================================================================
        - task_key: "save_metadata"
          description: "Registra metadados e estatísticas do batch"
          environment_key: "default"

          depends_on:
            - task_key: "save_predictions"

          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_metadata"

      # ==========================================================================
      # PARÂMETROS DO JOB
      # ==========================================================================
      parameters:
        - name: "catalog"
          default: "${var.catalog_name}"
        - name: "schema"
          default: "${var.schema_name}"

      # ==========================================================================
      # NOTIFICAÇÕES
      # ==========================================================================
      email_notifications:
        on_failure:
          - "eduardolimaofficial410@gmail.com"
        on_success:
          - "eduardolimaofficial410@gmail.com"  # Apenas em prod

      # ==========================================================================
      # TAGS
      # ==========================================================================
      tags:
        project: "iris-mlops"
        pipeline: "batch-inference"
        environment: "${bundle.target}"
