# ==============================================================================
# Job: Batch Inference Pipeline
# ==============================================================================
# 
# PROPÓSITO:
#   Executa inferência em lote usando o modelo em produção.
#   Processa novos dados da tabela dataset_drift e salva predições.
#
# QUANDO EXECUTAR:
#   - Diariamente após novos dados chegarem
#   - On-demand quando necessário
#   - Após promover novo modelo para produção
#
# ESTRUTURA DO PIPELINE:
#   1. load_new_data: Carrega dados da tabela dataset_drift
#   2. preprocess: Normaliza features (StandardScaler)
#   3. run_inference: Carrega modelo production e faz predições
#   4. save_predictions: Salva resultados na tabela batch_predictions
#   5. save_metadata: Registra métricas e estatísticas do batch
#
# DEPENDÊNCIAS:
#   - Tabela study.mlops_iris.dataset_drift deve estar populada
#   - Modelo production deve existir no MLflow Registry
#
# ==============================================================================

resources:
  jobs:
    batch_inference_pipeline:
      name: "Batch Inference Pipeline"
      description: |
        Executa inferência em lote usando modelo production.
        Processa dados de dataset_drift e salva predições em batch_predictions.
      
      # ==========================================================================
      # AGENDAMENTO
      # ==========================================================================
      # Em produção, roda automaticamente.
      # Em dev/staging, precisa ser disparado manualmente.
      
      schedule:
        quartz_cron_expression: "0 30 3 * * ?"  # Diariamente às 3:30 AM
        timezone_id: "America/Sao_Paulo"
        pause_status: "${var.schedule_pause_status}"
      
      # ==========================================================================
      # CONFIGURAÇÕES GLOBAIS DO JOB
      # ==========================================================================
      
      max_concurrent_runs: 1  # Apenas 1 execução por vez
      timeout_seconds: 3600   # Timeout de 1 hora
      
      # ==========================================================================
      # TASKS (ETAPAS DO PIPELINE)
      # ==========================================================================
      
      
      job_clusters:
        - job_cluster_key: "main_cluster"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            spark_conf:
              "spark.databricks.delta.preview.enabled": "true"

      tasks:
        # ======================================================================
        # TASK 1: CARREGAR NOVOS DADOS
        # ======================================================================
        # Carrega dados da tabela dataset_drift e valida features obrigatórias.
        # 
        # ENTRADA: study.mlops_iris.dataset_drift
        # SAÍDA: CSV temporário com dados validados
        # 
        - task_key: "load_new_data"
          description: "Carrega e valida dados de dataset_drift"
          job_cluster_key: "main_cluster"
          
          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_load_data"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"
          
          libraries:
            - pypi:
                package: "pandas>=2.0.0"
            - pypi:
                package: "scikit-learn>=1.3.0"
        
        # ======================================================================
        # TASK 2: PRÉ-PROCESSAR DADOS
        # ======================================================================
        # Aplica StandardScaler nas features.
        # IMPORTANTE: Usa mesmas estatísticas (mean/std) do treino.
        # 
        # ENTRADA: CSV da task anterior
        # SAÍDA: Features normalizadas + dados originais
        # 
        - task_key: "preprocess"
          description: "Normaliza features usando StandardScaler"
          job_cluster_key: "main_cluster"
          
          depends_on:
            - task_key: "load_new_data"
          
          job_cluster_key: "main_cluster"
          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_preprocess"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"
          
          libraries:
            - pypi:
                package: "pandas>=2.0.0"
            - pypi:
                package: "scikit-learn>=1.3.0"
        
        # ======================================================================
        # TASK 3: EXECUTAR INFERÊNCIA
        # ======================================================================
        # Carrega modelo production do MLflow Registry e faz predições.
        # 
        # MODELO: study.mlops_iris.logistic_regression_iris@production
        # ENTRADA: Features normalizadas
        # SAÍDA: Predições + probabilidades
        # 
        - task_key: "run_inference"
          description: "Carrega modelo production e executa inferência"
          job_cluster_key: "main_cluster"
          
          depends_on:
            - task_key: "preprocess"
          
          job_cluster_key: "main_cluster"
          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_predict"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"
          
          libraries:
            - pypi:
                package: "mlflow>=2.9.0"
            - pypi:
                package: "scikit-learn>=1.3.0"
        
        # ======================================================================
        # TASK 4: SALVAR PREDIÇÕES
        # ======================================================================
        # Salva predições + features originais na tabela batch_predictions.
        # 
        # MODO: APPEND (histórico completo de predições)
        # PARTICIONAMENTO: Por data_carga
        # 
        - task_key: "save_predictions"
          description: "Salva predições em batch_predictions"
          job_cluster_key: "main_cluster"
          
          depends_on:
            - task_key: "run_inference"
          
          job_cluster_key: "main_cluster"
          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_save"
            parameters:
              - "--catalog"
              - "${var.catalog_name}"
              - "--schema"
              - "${var.schema_name}"
          
          libraries:
            - pypi:
                package: "pandas>=2.0.0"
        
        # ======================================================================
        # TASK 5: SALVAR METADADOS
        # ======================================================================
        # Registra estatísticas do batch para monitoramento.
        # 
        # MÉTRICAS:
        #   - Distribuição de classes preditas
        #   - Confiança média/min/max
        #   - Percentual de predições incertas (<70%)
        # 
        - task_key: "save_metadata"
          description: "Registra metadados e estatísticas do batch"
          job_cluster_key: "main_cluster"
          
          depends_on:
            - task_key: "save_predictions"
          
          job_cluster_key: "main_cluster"
          python_wheel_task:
            package_name: "teste_mlops"
            entry_point: "batch_inference_metadata"
          
          libraries:
            - pypi:
                package: "pandas>=2.0.0"
      
      # ==========================================================================
      # PARÂMETROS DO JOB
      # ==========================================================================
      # Valores podem ser sobrescritos no momento da execução.
      
      parameters:
        - name: "catalog"
          default: "${var.catalog_name}"
        - name: "schema"
          default: "${var.schema_name}"
      
      # ==========================================================================
      # NOTIFICAÇÕES
      # ==========================================================================
      # Envia email em caso de falha.
      
      email_notifications:
        on_failure:
          - "eduardolimaofficial410@gmail.com"
        on_success:
          - "eduardolimaofficial410@gmail.com"  # Apenas em prod
      
      # ==========================================================================
      # TAGS (Para organização e billing)
      # ==========================================================================
      
      tags:
        project: "iris-mlops"
        pipeline: "batch-inference"
        environment: "${bundle.target}"